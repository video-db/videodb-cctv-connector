name: Build release Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing GitHub Release tag to attach the Docker image artifact to
        required: true
        type: string

permissions:
  contents: write

jobs:
  docker-image:
    name: Build and attach Docker image (${{ matrix.platform_slug }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_slug: linux-amd64
          - platform: linux/arm64
            platform_slug: linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag_name }}"
          fi

          IMAGE_NAME="videodb-cctv-connector"
          ARTIFACT="${IMAGE_NAME}-${TAG}-${{ matrix.platform_slug }}-docker-image.tar.gz"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --load \
            --platform "${{ matrix.platform }}" \
            --tag "${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.tag }}" \
            .

      - name: Save Docker image archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          docker save "${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.tag }}" \
            | gzip -9 > "dist/${{ steps.meta.outputs.artifact }}"
          (cd dist && sha256sum "${{ steps.meta.outputs.artifact }}" > "${{ steps.meta.outputs.artifact }}.sha256")

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.image_name }}-${{ steps.meta.outputs.tag }}-${{ matrix.platform_slug }}-docker-image
          path: dist/*
          if-no-files-found: error

      - name: Attach artifact to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ steps.meta.outputs.tag }}" dist/* --clobber
